<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-8">

<div id="shopping-cart-container"
class="bg-slate-800 text-white rounded-2xl shadow-xl p-8 flex flex-col lg:flex-row gap-10 max-w-5xl w-full">

<!-- PRODUTOS -->
<div class="flex-1">

<h2 class="text-3xl font-bold mb-8 text-purple-400">
Nossos Produtos
</h2>

<div id="products-container" class="space-y-6">

<div class="card bg-slate-700 p-6 rounded-xl flex justify-between items-center hover:scale-[1.02] transition">

<div>
<h2 class="text-xl font-semibold">Sapato</h2>
<p class="text-gray-300 text-sm">Quantidade: 150</p>
<p class="text-purple-300 font-medium">R$300</p>
</div>

<button class="remove-button bg-red-500 hover:bg-red-400 px-4 py-2 rounded-lg font-semibold">
Remove
</button>

</div>


<div class="card bg-slate-700 p-6 rounded-xl flex justify-between items-center hover:scale-[1.02] transition">

<div>
<h2 class="text-xl font-semibold">Bolsa</h2>
<p class="text-gray-300 text-sm">Quantidade: 10</p>
<p class="text-purple-300 font-medium">R$1.500</p>
</div>

<button class="remove-button bg-red-500 hover:bg-red-400 px-4 py-2 rounded-lg font-semibold">
Remove
</button>

</div>

</div>
</div>


<!-- RESUMO -->
<div id="order-summary-container"
class="bg-slate-700 p-6 rounded-xl w-full lg:w-72 flex flex-col gap-6 shadow-lg">

<h2 class="text-xl font-bold text-purple-400">
Order Summary
</h2>

<div class="flex justify-between text-lg">
<span>Total:</span>
<span id="total-amount" class="font-bold text-purple-300">
R$3.000
</span>
</div>

<a href="#"
class="bg-purple-600 hover:bg-purple-500 text-center p-3 rounded-lg font-semibold transition">
Checkout
</a>

</div>

</div>

</body>
</html>
