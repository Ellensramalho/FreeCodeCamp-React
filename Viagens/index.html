<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-sky-100">
    <div class="main-container grid grid-cols-3 gap-x8 flex mt-12">
      <div class="card rounded-lg p-8 bg-indigo-300">
        <img class="rounded-lg" src="https://res.cloudinary.com/worldpackers/image/upload/c_fill,f_auto,q_auto,w_1024/v1/guides/article_cover/tt0e6ae6yrbzsyssy6xj?_a=BACAGSGT" alt="Praia">
        <h1 class="subheading font-semibold text-base">Praia</h1>
        <p class="description text-base">A praia é o lugar onde o mar acalma a mente e o vento leva as preocupações.</p>
      </div>
      <div class="card rounded-lg p-8 bg-fuchsia-200">
        <img class="rounded-lg" src="https://lh7-rt.googleusercontent.com/docsz/AD_4nXcn3bOrR2voAu0LxHE2dIdl_r9sHMMeVWArByw5_MxNyweH1DER7pF8pg_v4v7mt2F91Xd843SQE4Zvu1xtHlx0m7yUGy5SE96nVmBLwT8hTr5znhNDhPuBH80ZaejZT61VaruN?key=J5gK3k-nVmA5HcDo5IBOEX2Y" alt="Praia">
        <h1 class="subheading font-semibold text-base">Águas azuis</h1>
        <p class="description text-base">Entre o som das ondas e o calor do sol, a praia vira o melhor refúgio.</p>
      </div>
      <div class="card rounded-lg p-8 bg-indigo-300">
        <img class="rounded-lg"src="https://www.fntconcierge.com.br/wp-content/uploads/2024/12/img-melhores-praias-para-viajar-em-janeiro.png" alt="Praia">
        <h1 class="subheading font-semibold text-base ">Ponte sobre água</h1>
        <p class="description text-base">Sal na pele, sol no rosto e paz no coração.</p>
      </div>
    </div>
  </body>
</html>
